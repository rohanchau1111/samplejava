```yaml
name: Build Java Project and Azure Login

on:
  workflow_dispatch:
    inputs:
      azure_client_id:
        description: "Azure Client ID"
        required: true
        type: string

      azure_client_secret:
        description: "Azure Client Secret (Testing Only)"
        required: true
        type: string

      azure_subscription_id:
        description: "Azure Subscription ID"
        required: true
        type: string

      azure_tenant_id:
        description: "Azure Tenant ID"
        required: true
        type: string

jobs:
  build-java:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Build Project
        run: mvn clean install

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ github.event.inputs.azure_client_id }}",
              "clientSecret": "${{ github.event.inputs.azure_client_secret }}",
              "subscriptionId": "${{ github.event.inputs.azure_subscription_id }}",
              "tenantId": "${{ github.event.inputs.azure_tenant_id }}"
            }

      - name: Verify Azure Login
        run: |
          echo "Logged into Azure..."
          az account show
          az account list --output table

      - name: List Resource Groups
        run: |
          az group list --output table

      - name: Success Message
        run: |
          echo "Java Build Successful!"
          echo "Azure Login Successful!"
```
