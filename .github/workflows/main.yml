```yaml
name: Manual Azure Login Test

on:
  workflow_dispatch:
    inputs:
      azure_client_id:
        description: Azure Client ID
        required: true
        type: string

      azure_client_secret:
        description: Azure Client Secret
        required: true
        type: string

      azure_subscription_id:
        description: Azure Subscription ID
        required: true
        type: string

      azure_tenant_id:
        description: Azure Tenant ID
        required: true
        type: string

jobs:
  azure-login:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ github.event.inputs.azure_client_id }}
          tenant-id: ${{ github.event.inputs.azure_tenant_id }}
          subscription-id: ${{ github.event.inputs.azure_subscription_id }}
          client-secret: ${{ github.event.inputs.azure_client_secret }}

      - name: Show Current Azure Account
        run: |
          echo "Current Azure Account"
          az account show

      - name: Show Subscription
        run: |
          az account list --output table

      - name: List Resource Groups
        run: |
          az group list --output table

      - name: List Virtual Machines
        run: |
          az vm list --output table

      - name: Logout
        run: az logout

      - name: Success
        run: echo "Azure login completed successfully."
```
