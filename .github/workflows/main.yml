name: Azure Create Resource Group (Manual)

# Only allow manual triggering from the GitHub Actions UI / API.
# No push, pull_request, or schedule triggers are defined.
on:
  workflow_dispatch:
    inputs:
      azure_client_id:
        description: 'Azure Client ID (App Registration / Service Principal)'
        required: true
        type: string
      azure_tenant_id:
        description: 'Azure Tenant ID'
        required: true
        type: string
      azure_subscription_id:
        description: 'Azure Subscription ID'
        required: true
        type: string
      azure_client_secret:
        description: 'Azure Client Secret (leave blank if using OIDC federated credentials)'
        required: false
        type: string
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - production
        default: dev
      resource_group_name:
        description: 'Name of the resource group to create'
        required: true
        type: string
      resource_group_location:
        description: 'Azure region for the resource group (e.g. eastus, centralindia, westeurope)'
        required: true
        type: string
        default: 'centralindia'

permissions:
  id-token: write   # needed for OIDC login to Azure
  contents: read

jobs:
  create-resource-group:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---- Option A: Login using OIDC (recommended, no client secret needed) ----
      - name: Azure Login (OIDC)
        if: ${{ github.event.inputs.azure_client_secret == '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ github.event.inputs.azure_client_id }}
          tenant-id: ${{ github.event.inputs.azure_tenant_id }}
          subscription-id: ${{ github.event.inputs.azure_subscription_id }}

      # ---- Option B: Login using a Client Secret (if provided at trigger time) ----
      - name: Azure Login (Client Secret)
        if: ${{ github.event.inputs.azure_client_secret != '' }}
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ github.event.inputs.azure_client_id }}",
              "clientSecret": "${{ github.event.inputs.azure_client_secret }}",
              "subscriptionId": "${{ github.event.inputs.azure_subscription_id }}",
              "tenantId": "${{ github.event.inputs.azure_tenant_id }}"
            }

      - name: Verify Azure CLI access
        run: |
          az account show
          az account list --output table

      - name: Create Resource Group
        run: |
          echo "Creating resource group '${{ github.event.inputs.resource_group_name }}' in '${{ github.event.inputs.resource_group_location }}'..."
          az group create \
            --name "${{ github.event.inputs.resource_group_name }}" \
            --location "${{ github.event.inputs.resource_group_location }}" \
            --tags environment=${{ github.event.inputs.environment }} createdBy=github-actions

      - name: Verify Resource Group
        run: |
          az group show --name "${{ github.event.inputs.resource_group_name }}" --output table

      - name: Azure Logout
        if: always()
        run: az logout || true
